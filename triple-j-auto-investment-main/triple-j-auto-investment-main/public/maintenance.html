<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triple J Auto Investment - Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 500px;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      display: block;
    }
    .divider {
      width: 60px;
      height: 1px;
      background: #D4AF37;
      margin: 0 auto 2rem;
      opacity: 0.5;
    }
    h1 {
      font-size: 1.25rem;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
      color: #D4AF37;
      font-weight: 600;
    }
    h2 {
      font-size: 1rem;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      color: #9CA3AF;
      font-weight: 400;
      font-style: italic;
    }
    .message {
      color: #9CA3AF;
      font-size: 0.875rem;
      line-height: 1.75;
      margin-bottom: 1rem;
    }
    .message-es {
      color: #6B7280;
      font-size: 0.8125rem;
      line-height: 1.75;
      font-style: italic;
      margin-bottom: 2rem;
    }
    .contact {
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      padding-top: 2rem;
      margin-top: 1rem;
    }
    .phone-link {
      color: #D4AF37;
      text-decoration: none;
      font-size: 1.125rem;
      letter-spacing: 0.05em;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 0.75rem;
    }
    .phone-link:hover {
      color: #fff;
    }
    .hours {
      font-size: 0.75rem;
      color: #4B5563;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .brand {
      margin-top: 3rem;
      font-size: 0.625rem;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/GoldTripleJLogo.png" alt="Triple J Auto Investment" class="logo" />
    <div class="divider"></div>

    <h1>WE'LL BE BACK SHORTLY</h1>
    <h2>REGRESAMOS PRONTO</h2>

    <p class="message">
      We're making some improvements to serve you better.<br />
      Please check back in a few minutes.
    </p>
    <p class="message-es">
      Estamos haciendo mejoras para servirle mejor.<br />
      Por favor, vuelva en unos minutos.
    </p>

    <div class="contact">
      <a href="tel:+18324009760" class="phone-link">(832) 400-9760</a>
      <p class="hours">Mon-Sat 9AM-6PM &nbsp;|&nbsp; Lun-Sab 9AM-6PM</p>
    </div>

    <p class="brand">&copy; 2026 Triple J Auto Investment</p>
  </div>
</body>
</html>
